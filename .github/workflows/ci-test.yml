name: CI Automated Testing

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  test-analytics-api:
    name: Build & Test Analytics API
    runs-on: ubuntu-latest

    steps:
      # 1. Kéo mã nguồn
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Cài đặt Newman
      - name: Install Newman
        run: npm install -g newman

      # 4. Tạo file .env để app chạy
      - name: Prepare Environment File
        run: cp .env.example .env

      # 5. Tạo file environment cho Postman (CÁCH 2)
      - name: Create Postman Environment File
        run: |
          mkdir -p postman/environments
          echo '{
            "id": "ci-env-id",
            "name": "local",
            "values": [
              {
                "key": "base_url",
                "value": "http://localhost:8000",
                "enabled": true
              }
            ]
          }' > postman/environments/local.json

      # 6. Khởi động Docker Compose
      - name: Start Docker Compose System
        run: make compose-up

      # 7. Chờ API healthy
      - name: Wait for API to be healthy
        run: |
          echo "Đang chờ API Analytics khởi động..."
          sleep 15
          curl --retry 5 --retry-delay 5 --retry-connrefused http://localhost:8000/health
          echo "Hệ thống đã sẵn sàng!"

      # 8. Chạy test
      - name: Run Newman Tests
        run: make test-compose

      # 9. Dọn dẹp
      - name: Tear Down System
        if: always()
        run: make compose-down