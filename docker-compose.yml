services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: analytics-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./init_db:/docker-entrypoint-initdb.d
    networks:
      - team-internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-analytics_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    container_name: analytics-api
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    networks:
      - team-internal
    depends_on:
      db:
        condition: service_healthy

  data-worker:
    build:
      context: .
    container_name: analytics-worker
    environment:
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MQTT_BROKER: ${MQTT_BROKER}
      MQTT_PORT: ${MQTT_PORT}
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    networks:
      - team-internal
    # Ghi đè lệnh khởi động để chạy file worker
    command: [ "python", "src/analytics_app/workers/mqtt_subscriber.py" ]
    depends_on:
      db:
        condition: service_healthy

networks:
  team-internal:
    driver: bridge
